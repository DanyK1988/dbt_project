models:
  - name: fct_ticket_flights
    description: "Fact table for ticket flights"
    docs:
      show: true
      node_color: green
    config:
      contract: { enforced: true }
    meta:
      owner: "Dany"
      status: "in development"

    columns:
      - name: ticket_no
        data_type: varchar(13)
        constraints:
          - type: not_null
      - name: flight_id
        data_type: integer
        constraints:
          - type: not_null
      - name: fare_conditions
        data_type: varchar(10)
        constraints:
          - type: not_null
      - name: amount
        data_type: numeric(10, 2)
        constraints:
          - type: check
            expression: "amount > 0"
      - name: loaded_at
        data_type: timestamp with time zone
